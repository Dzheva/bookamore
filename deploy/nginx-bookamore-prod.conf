server {
    listen 80;
    server_name bookamore.alt-web.biz.ua;
    # Проксування до frontend (контейнер на порту 4000)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Проксування API (контейнер backend на порту 4100)
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Обробка завантажених фото (книги)
    location ~ ^/uploads/book(s)?/(.*)$ {
        alias /var/lib/docker/volumes/bookamore_prod_uploads/_data/books/$2;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    # Обробка завантажених фото (пропозиції)
    location ~ ^/uploads/offer(s)?/(.*)$ {
        alias /var/lib/docker/volumes/bookamore_prod_uploads/_data/offers/$2;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    # Логування
    access_log /var/log/nginx/bookamore-prod-access.log;
    error_log /var/log/nginx/bookamore-prod-error.log;
}
