# --- PROD: bookamore.alt-web.biz.ua ---
server {
    listen 443 ssl;
    server_name bookamore.alt-web.biz.ua;

    ssl_certificate /etc/letsencrypt/live/bookamore.alt-web.biz.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookamore.alt-web.biz.ua/privkey.pem;

    # РОЗДАЧА ФРОНТЕНДУ (PROD) - фронтенд працює як Docker-контейнер на 127.0.0.1:3432
    location / {
        proxy_pass http://127.0.0.1:3432;
        proxy_set_header Host $host;
    }

    # Проксі для API (запити до бекенду)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI та документація (Додано)
    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ОБРОБКА ЗОБРАЖЕНЬ (PROD)
    # Бекенд пише файли в ${UPLOADS_DIR}/<entity>/<hash>.<ext>,
    # тому /img/book/x.jpg має мапитись у .../uploads/book/x.jpg
    location /img/ {
        alias /home/deploy/www/prod/uploads/;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }
}

# --- DEV: bookamore-dev.alt-web.biz.ua ---
server {
    listen 443 ssl;
    server_name bookamore-dev.alt-web.biz.ua;

    ssl_certificate /etc/letsencrypt/live/bookamore.alt-web.biz.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookamore.alt-web.biz.ua/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3433/;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    location /img/ {
        alias /home/deploy/www/dev/uploads/;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }
}

# --- Редирект з HTTP на HTTPS ---
server {
    listen 80;
    server_name bookamore.alt-web.biz.ua bookamore-dev.alt-web.biz.ua;
    return 301 https://$host$request_uri;
}
