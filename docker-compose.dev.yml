name: bookamore_dev

services:
  # Backend (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookamore_dev_backend
    ports:
      - "127.0.0.1:${BE_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - CLIENT_URL=${CLIENT_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
    volumes:
      # Мапимо папку з контейнера на папку на вашому VPS
      - uploads_data:/app/uploads
    depends_on:
      - db

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookamore_dev_frontend
    ports:
      - "127.0.0.1:${FE_PORT}:80"
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend

  # База даних (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: bookamore_dev_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  uploads_data:
    driver: local
    driver_opts:
      type: none
      device: ${UPLOADS_DIR}
      o: bind
