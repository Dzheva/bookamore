server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /img/ {
        alias /usr/share/nginx/html/uploads/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

