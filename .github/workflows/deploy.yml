name: Deploy to VPS

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            if [ "${{ github.ref_name }}" = "main" ]; then
              TARGET_DIR="/home/mrx/deploy/bookamore-prod"
              FE_PORT="4000"
              BE_PORT="4100"
              DB_PORT="5432"
              DB_NAME="bookamore_prod"
              APP_NAME="bookamore_prod"
              SPRING_PROFILES_ACTIVE="prod"
              CLIENT_URL="https://bookamore.alt-web.biz.ua"
            elif [ "${{ github.ref_name }}" = "dev" ]; then
              TARGET_DIR="/home/mrx/deploy/bookamore-dev"
              FE_PORT="3000"
              BE_PORT="3100"
              DB_PORT="5433"
              DB_NAME="bookamore_dev"
              APP_NAME="bookamore_dev"
              SPRING_PROFILES_ACTIVE="dev"
              CLIENT_URL="https://bookamore-dev.alt-web.biz.ua"
            else
              echo "Unsupported branch: ${{ github.ref_name }}"
              exit 1
            fi

            REPO_URL="${{ secrets.DEPLOY_REPO_SSH_URL }}"

            mkdir -p "$TARGET_DIR"

            if [ ! -d "$TARGET_DIR/.git" ]; then
              git clone "$REPO_URL" "$TARGET_DIR"
            fi

            cd "$TARGET_DIR"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            cat > .env <<EOF
            APP_NAME=$APP_NAME
            FE_PORT=$FE_PORT
            BE_PORT=$BE_PORT
            DB_PORT=$DB_PORT
            DB_NAME=$DB_NAME
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            CLIENT_URL=$CLIENT_URL
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FACEBOOK_CLIENT_ID=${{ secrets.FACEBOOK_CLIENT_ID }}
            FACEBOOK_CLIENT_SECRET=${{ secrets.FACEBOOK_CLIENT_SECRET }}
            EOF

            docker compose --env-file .env up -d --build

