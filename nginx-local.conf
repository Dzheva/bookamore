events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        client_max_body_size 21M;

        set $backend_upstream backend:8080;
        set $frontend_upstream frontend:3000;

        # 1. Обробка шляхів з БД (новий блок)
        # Фактичні файли лежать у /usr/share/nginx/html/uploads/img/{book,offer}/...
        location /images/ {
            alias /usr/share/nginx/html/uploads/img/;
            autoindex off;
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            add_header Cache-Control public;
            expires 1h;
            access_log off;
        }

        # 2. Обробка старих префіксів для сумісності
        location /img/ {
            alias /usr/share/nginx/html/uploads/img/;
            autoindex off;
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            add_header Cache-Control public;
            expires 1h;
            access_log off;
        }

        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            autoindex off;
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            add_header Cache-Control public;
            expires 1h;
            access_log off;
        }

        # API запити
        location ~ ^/(api/v1/|swagger-ui/|v3/api-docs) {
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OAuth2
        location ~ ^/(login/)?oauth2/ {
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }
    }
}