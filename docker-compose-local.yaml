services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"   # змінено з 80:80 — уникаємо конфлікту з системним Nginx
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf
      - ./data/uploads:/usr/share/nginx/html/uploads:ro   # bind-mount: фото з ./data/uploads віддаються через /img/
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    tty: true
    build:
      context: ./backend
      dockerfile: Dockerfile-local
    depends_on:
      - bookamore-db
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      # Керовані змінні: setup-dev.sh виставляє mode=never при синку з прод,
      # щоб демо-сід data-local.sql НЕ заливався поверх реальних даних.
      # Без явного проброшування сюди docker compose ігнорує host-env.
      - SPRING_SQL_INIT_MODE=${SPRING_SQL_INIT_MODE:-always}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bookamore-db:5432/bookamore-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - FILE_UPLOAD_DIR=/app/uploads/img
      - CLIENT_URL=http://localhost:8080
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
      - ./data/uploads:/app/uploads   # bind-mount: спільна тека з nginx; нові завантаження → data/uploads/img
    networks:
      - app-network
    # healthcheck прибрано: /actuator/health недоступний (spring-boot-starter-actuator
    # відсутній у pom.xml), тому перевірка завжди давала хибний 'unhealthy'.

  bookamore-db:
    image: postgres:16-alpine   # фіксована версія замість latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookamore-db
    networks:
      - app-network
    ports:
      - "127.0.0.1:5433:5432"   # змінено з 5432:5432 — уникаємо конфлікту з системним PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume — дані не губляться між рестартами
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookamore-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    tty: true
    build:
      context: ./frontend
      dockerfile: Dockerfile-local
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/usr/app
      - /usr/app/node_modules   # виправлено: /app → /usr/app (відповідає WORKDIR у Dockerfile-local)
    depends_on:
      - backend
    networks:
      - app-network
    # healthcheck прибрано: Vite dev-образ не містить curl, тому перевірка
    # давала хибний 'unhealthy' попри робочий сервер на :3000.

volumes:
  pgdata:       # дані PostgreSQL
  # uploads більше не named volume — використовуємо bind-mount ./data/uploads (див. nginx/backend)

networks:
  app-network:
    driver: bridge
