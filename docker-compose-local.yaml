services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf
      - ./data/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  backend:
    tty: true
    build:
      context: ./backend
      dockerfile: Dockerfile-local
    depends_on:
      bookamore-db:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bookamore-db:5432/bookamore-db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - FILE_UPLOAD_DIR=/uploads/img
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-create}
      - SPRING_SQL_INIT_MODE=${SPRING_SQL_INIT_MODE:-always}
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
      - ./data/uploads:/uploads
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  bookamore-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookamore-db
    networks:
      - app-network
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookamore-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    tty: true
    build:
      context: ./frontend
      dockerfile: Dockerfile-local
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/usr/app
      - frontend_node_modules:/usr/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  pgdata:
